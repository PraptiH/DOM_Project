<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://kit.fontawesome.com/28bbd88697.js" crossorigin="anonymous"></script>
    <title>Document</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: rgb(19, 17, 17);
        }
    </style>
</head>

<body>
    <!-- navbar -->
    <div class="border-2 bg-black py-3 px-8">
        <img src="./assets/logo.png" alt="">
    </div>

    <div class="border-2 border-white flex gap-5 py-3 px-8">
        <div class="w-[60%]">
            <img class="milestoneImage rounded-2xl" src="./assets/kv.png" alt="">
            <div class="text-white mt-5 space-y-2">
                <h3 class="milestoneTitle font-bold text-3xl">Module Title</h3>
                <p class="milestoneParagraph font-medium text-lg">Module Description</p>
            </div>
        </div>

        <div class="milestones bg-black w-[40%] h-fit my-2 rounded-xl pb-1">

            <div class="milestone">

                <div class="flex items-center gap-3 mx-3 px-[8%] py-[2%] border-b-1 border-gray-400">

                </div>

                <div class="hidden_panel hidden">

                </div>


            </div>
        </div>
    </div>

    <div class="completedMilestone bg-black w-[38%] h-fit my-2 rounded-xl pb-1 absolute right-8">
        <p class="text-white font-semibold text-xl p-4">Completed milestone</p>
    </div>


    <script src="./js/data.js"></script>
    <script src="./js/main.js"></script>
</body>

</html>
